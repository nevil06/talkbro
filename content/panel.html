<!-- TalkBro — Floating Panel HTML (injected into Shadow DOM) -->
<div id="talkbro-panel" class="talkbro-collapsed">
  <!-- Collapsed Pill -->
  <button id="talkbro-pill" class="talkbro-pill" aria-label="Open TalkBro">
    <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    <span class="pill-label">TalkBro</span>
    <span class="pill-pulse"></span>
  </button>

  <!-- Expanded Panel -->
  <div id="talkbro-expanded" class="talkbro-expanded">
    <!-- Header -->
    <div class="talkbro-header" id="talkbro-drag-handle">
      <div class="header-left">
        <svg class="header-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span class="header-title">TalkBro</span>
      </div>
      <div class="header-right">
        <select id="talkbro-preset" class="preset-select" aria-label="Enhancement style">
          <option value="clean">✨ Clean Up</option>
          <option value="formal">🎩 Formal</option>
          <option value="bullets">📋 Bullets</option>
          <option value="email">✉️ Email</option>
          <option value="code">💻 Code Docs</option>
          <option value="summary">📝 Summary</option>
        </select>
        <button id="talkbro-settings-btn" class="icon-btn" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button id="talkbro-minimize" class="icon-btn" aria-label="Minimize" title="Minimize">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button id="talkbro-close" class="icon-btn" aria-label="Close" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Waveform Visualizer -->
    <div id="talkbro-waveform-container" class="waveform-container hidden">
      <canvas id="talkbro-waveform" class="waveform-canvas"></canvas>
      <span class="recording-indicator">
        <span class="red-dot"></span>
        Recording...
      </span>
    </div>

    <!-- Status Area -->
    <div id="talkbro-status" class="status-area">
      <div class="status-idle">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        </svg>
        <p>Tap the mic to start speaking</p>
      </div>
    </div>

    <!-- Results Area -->
    <div id="talkbro-results" class="results-area hidden">
      <!-- Raw Transcript Card -->
      <div class="result-card raw-card">
        <div class="card-header">
          <span class="card-label">🎤 Raw Transcript</span>
          <button class="copy-btn" data-target="raw" aria-label="Copy raw transcript">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
        <div id="talkbro-raw-text" class="card-content"></div>
      </div>

      <!-- Enhanced Text Card -->
      <div class="result-card enhanced-card">
        <div class="card-header">
          <span class="card-label">✨ Enhanced</span>
          <button class="copy-btn" data-target="enhanced" aria-label="Copy enhanced text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
        <div id="talkbro-enhanced-text" class="card-content"></div>
      </div>
    </div>

    <!-- Processing Indicator -->
    <div id="talkbro-processing" class="processing-area hidden">
      <div class="shimmer-loader">
        <div class="shimmer-line"></div>
        <div class="shimmer-line short"></div>
        <div class="shimmer-line"></div>
      </div>
      <span class="processing-text">Enhancing your text...</span>
    </div>

    <!-- Error Toast -->
    <div id="talkbro-toast" class="toast hidden"></div>

    <!-- Footer with Mic Button -->
    <div class="talkbro-footer">
      <button id="talkbro-mic" class="mic-btn" aria-label="Start recording">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg class="stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
      <button id="talkbro-clear" class="clear-btn hidden" aria-label="Clear results">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear
      </button>
    </div>
  </div>
</div>
