<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkBro — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-container">
    <header class="sp-header">
      <div class="sp-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span>TalkBro</span>
      </div>
      <div class="sp-actions">
        <button id="sp-settings" class="sp-icon-btn" title="Settings">⚙️</button>
        <button id="sp-clear-all" class="sp-icon-btn" title="Clear History">🗑️</button>
      </div>
    </header>

    <div class="sp-search">
      <input type="text" id="sp-search-input" placeholder="Search history..." aria-label="Search history">
    </div>

    <div id="sp-history-list" class="sp-history-list">
      <div class="sp-empty">
        <p>No history yet</p>
        <span>Your voice transcriptions will appear here</span>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
